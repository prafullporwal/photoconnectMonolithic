# =============================================================================
# PhotoConnect Monolithic — Local Infrastructure
# =============================================================================
# Brings up the three external dependencies the monolith needs:
#   - PostgreSQL  (single photoconnect_db database — replaces the 3 separate
#                  databases the microservices version had)
#   - Redis       (JWT blacklist + OTP storage)
#   - MinIO       (S3-compatible portfolio media storage)
#
# No Eureka, no Config Server, no Gateway, no MySQL, no Zipkin — the monolith
# doesn't need any of them.
#
# Usage:
#   docker compose up -d        # start infra
#   docker compose ps           # check health
#   docker compose down         # stop (keeps data)
#   docker compose down -v      # stop and wipe volumes
#
# Then run the Spring Boot app from your IDE, or:
#   ./mvnw spring-boot:run
# =============================================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: pcm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: photoconnect_db
    ports:
      - "5432:5432"
    volumes:
      - pcm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [pcm-net]

  redis:
    image: redis:7-alpine
    container_name: pcm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pcm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [pcm-net]

  minio:
    image: minio/minio:latest
    container_name: pcm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console at http://localhost:9001
    volumes:
      - pcm_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [pcm-net]

  # Creates the bucket the app expects on a fresh `docker compose up`.
  minio-init:
    image: minio/mc:latest
    container_name: pcm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/photoconnect-media &&
      mc anonymous set download local/photoconnect-media &&
      echo 'MinIO bucket ready: photoconnect-media' &&
      exit 0
      "
    networks: [pcm-net]

volumes:
  pcm_postgres_data:
  pcm_redis_data:
  pcm_minio_data:

networks:
  pcm-net:
    driver: bridge
    name: pcm-net

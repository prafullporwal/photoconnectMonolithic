# =============================================================================
# nginx config for the PhotoConnect monolith
# =============================================================================
# Two jobs:
#   1. Serve the built React SPA from /usr/share/nginx/html
#   2. Reverse-proxy /api/* to the monolith Spring Boot app on monolith:8080
#
# The SPA uses client-side routing (react-router), so any path that isn't a
# real file falls back to index.html — the router takes it from there.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match Spring's multipart limit so portfolio uploads aren't truncated
    # by nginx before they reach the app.
    client_max_body_size 110m;

    # API → monolith. Trailing slash on proxy_pass preserves the /api prefix
    # because the location has a trailing slash too.
    location /api/ {
        proxy_pass         http://monolith:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: try the file, then the directory, then index.html so
    # deep links like /photographers/42 don't 404 on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

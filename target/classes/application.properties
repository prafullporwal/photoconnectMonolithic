# =============================================================================
# PhotoConnect monolith — application configuration
# =============================================================================
# Single Spring Boot app, single Postgres DB, single Redis, single MinIO.
# No Eureka, no Config Server, no Gateway — those microservice-only concerns
# disappear when everything runs in one JVM.
# =============================================================================

spring.application.name=photoconnect
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# -----------------------------------------------------------------------------
# Datasource — single PostgreSQL DB owning ALL tables (users, photographers,
# customers, inquiries, favorites, reviews, etc.)
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/photoconnect_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=4
spring.datasource.hikari.connection-timeout=10000

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------------------------------------------------------
# Flyway
# -----------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# -----------------------------------------------------------------------------
# Redis (JWT blacklist + OTP storage)
# -----------------------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s

# -----------------------------------------------------------------------------
# Multipart uploads (portfolio media)
# -----------------------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB

# -----------------------------------------------------------------------------
# JWT — RS256 signing and verification (auth.jwt.* → JwtProperties)
# -----------------------------------------------------------------------------
auth.jwt.issuer=photoconnect
auth.jwt.audience=photoconnect-api
auth.jwt.access-token-ttl=PT15M
auth.jwt.refresh-token-ttl=P7D
auth.jwt.private-key-path=${AUTH_PRIVATE_KEY_PATH:keys/private_key.pem}
auth.jwt.public-key-path=${AUTH_PUBLIC_KEY_PATH:keys/public_key.pem}

# -----------------------------------------------------------------------------
# OTP (app.otp.* → OtpProperties)
# -----------------------------------------------------------------------------
app.otp.provider=${OTP_PROVIDER:dev}
app.otp.dev-mode=${OTP_DEV_MODE:true}
app.otp.length=6
app.otp.ttl=PT5M
app.otp.resend-cooldown=PT30S
app.otp.max-attempts=5

# -----------------------------------------------------------------------------
# Object storage (storage.* → StorageProperties)
# -----------------------------------------------------------------------------
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.public-url-prefix=${STORAGE_PUBLIC_URL:http://localhost:9000}
storage.bucket=${STORAGE_BUCKET:photoconnect-media}
storage.region=${STORAGE_REGION:us-east-1}
storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
storage.path-style-access=true

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.endpoint.env.show-values=never

# -----------------------------------------------------------------------------
# Swagger UI / OpenAPI
# -----------------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.photoconnect=DEBUG
